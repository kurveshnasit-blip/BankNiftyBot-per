name: 🚀 Build BankNifty APK (Fixed)
on: 
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: ☕ Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 🔧 Setup Gradle 8.4
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: '8.4'
        arguments: assembleDebug

    - name: 📋 List outputs
      run: find app/build/outputs -name "*.apk" -ls

    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: BankNiftyBot-APK
        path: |
          app/build/outputs/apk/debug/app-*.apk
        retention-days: 30

    - name: 🎉 Success
      if: success()
      run: |
        echo "✅ APK BUILT SUCCESSFULLY!"
        echo "📱 Download from Artifacts tab above"